[PHP]
; ✅ PRODUCTION SETTINGS - Dioptimasi untuk performa & keamanan
zend.exception_ignore_args = on
expose_php = off
max_execution_time = 60
max_input_vars = 3000
upload_max_filesize = 64M
post_max_size = 128M
memory_limit = 512M

; ✅ Matikan display error di production (keamanan!)
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT
display_errors = off
display_startup_errors = off
log_errors = on
error_log = /var/log/php/php-error.log
default_charset = UTF-8

; ✅ Assertions dimatikan di production (performa)
zend.assertions = -1

[Date]
date.timezone = Asia/Jakarta

[mysqlnd]
mysqlnd.collect_memory_statistics = off

[mbstring]
; mbstring.language = Japanese

[opcache]
; ✅ OPcache dikonfigurasi maksimal untuk Octane
opcache.enable = 1
opcache.enable_cli = 1
; Naikkan memory consumption agar lebih banyak file ter-cache
opcache.memory_consumption = 256
opcache.interned_strings_buffer = 32
; Naikkan jumlah file yang bisa di-cache (Laravel + semua vendor)
opcache.max_accelerated_files = 20000
; Di production + Octane, set 0 agar tidak ada pengecekan file = SUPER CEPAT
opcache.revalidate_freq = 0
opcache.validate_timestamps = 0
opcache.fast_shutdown = 1
; Aktifkan JIT untuk PHP 8+ = performa ekstra ~10-20%
opcache.jit = 1255
opcache.jit_buffer_size = 128M