[PHP]
; ⚡ OPTIMASI KEAMANAN & KECEPATAN
zend.exception_ignore_args = on
expose_php = off
max_execution_time = 60
max_input_vars = 3000
upload_max_filesize = 64M
post_max_size = 128M
memory_limit = 1G
default_charset = UTF-8

; ⚡ ERROR REPORTING UNTUK PRODUKSI (Jangan tampilkan error ke browser)
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT
display_errors = off
display_startup_errors = off
log_errors = on
error_log = /var/log/php/php-error.log

[Date]
date.timezone = Asia/Jakarta

[mysqlnd]
mysqlnd.collect_memory_statistics = off

[Assertion]
; Nonaktifkan assertion di produksi untuk menghemat CPU
zend.assertions = -1

[opcache]
; ⚡ OPTIMASI OPCACHE MAKSIMAL UNTUK LARAVEL OCTANE
opcache.enable=1
opcache.enable_cli=1
opcache.memory_consumption=256
opcache.interned_strings_buffer=32
opcache.max_accelerated_files=32531
opcache.fast_shutdown=1

; Karena kode di Docker bersifat statis, matikan validasi timestamp agar PHP tidak perlu mengecek file berulang kali
opcache.validate_timestamps=0
opcache.revalidate_freq=0

; ⚡ AKTIFKAN JIT COMPILER (Just-In-Time) - Fitur andalan PHP 8+ untuk mendongkrak CPU-bound task
opcache.jit_buffer_size=128M
opcache.jit=1254
